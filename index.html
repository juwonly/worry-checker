<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>고민 중요도 확인기</title>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="app-card">

        <!-- 시작 화면 -->
        <section id="startScreen">

            <h1 class="title">
                🧠 고민 중요도 확인기
            </h1>

            <p class="description">
                현재 고민이 나에게 얼마나 큰 영향을 주고 있는지
                간단한 질문을 통해 확인해보세요.
            </p>


            <textarea 
                id="worryInput"
                class="form-control mb-3"
                rows="4"
                placeholder="현재 고민을 적어주세요..."
            ></textarea>


            <button 
                class="btn btn-primary w-100"
                onclick="startTest()">
                시작하기
            </button>

        </section>



        <!-- 질문 화면 -->
        <section id="questionScreen" class="d-none">

            <div class="progress mb-4">

                <div 
                    id="progressBar"
                    class="progress-bar"
                    role="progressbar">
                </div>

            </div>


            <h5 id="questionNumber"
                class="text-secondary">
            </h5>


            <h2 
                id="questionText"
                class="question">
            </h2>


            <div class="answer-box">

                <button 
                    class="btn btn-success answer-btn"
                    onclick="answer(true)">
                    예
                </button>


                <button 
                    class="btn btn-outline-secondary answer-btn"
                    onclick="answer(false)">
                    아니오
                </button>

            </div>


        </section>




        <!-- 결과 화면 -->

        <section id="resultScreen" class="d-none">


            <h1 class="title">
                결과
            </h1>


            <div class="score-card">

                <h2>
                    중요도
                </h2>


                <div id="score"
                     class="score">
                </div>

                <p id="resultText">
                </p>

            </div>



            <button
                class="btn btn-primary w-100 mb-2"
                onclick="shareResult()">

                공유하기

            </button>



            <button
                class="btn btn-outline-secondary w-100"
                onclick="restart()">

                다시 하기

            </button>


        </section>


    </div>

</div>


<script src="script.js"></script>

</body>
</html>
