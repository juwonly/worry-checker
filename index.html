<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>고민 중요도 확인기</title>


<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<div class="app-card">



<!-- 시작 -->

<section id="start">


<h1>
🧠 고민 중요도 확인기
</h1>


<p class="intro">

7개의 질문으로 현재 고민이
나에게 미치는 영향을 확인합니다.

</p>



<textarea
id="worry"
class="form-control"
placeholder="현재 고민을 입력하세요">
</textarea>




<button
onclick="startTest()"
class="btn btn-primary w-100 mt-3">

시작하기

</button>


</section>







<!-- 질문 -->

<section id="quiz" class="hidden">


<div class="progress">

<div
id="progressBar"
class="progress-bar">

</div>

</div>



<p id="number"></p>



<h3 id="question"></h3>





<button
class="btn btn-success answer"
onclick="answer(true)">

예

</button>



<button
class="btn btn-outline-secondary answer"
onclick="answer(false)">

아니오

</button>




<button
id="backBtn"
class="btn btn-light answer"
onclick="previousQuestion()">

← 이전 질문

</button>




</section>









<!-- 결과 -->

<section id="result" class="hidden">


<h1>
결과
</h1>



<div class="my-worry">


<h5>
나의 고민
</h5>


<p id="savedWorry"></p>


</div>






<div class="chart-area">


<canvas id="gauge"></canvas>



<div class="score-text">


<span id="score"></span>

<small>/15</small>


<div id="level"></div>


</div>


</div>





<div class="scale">


<div>

1

<br>

🟢 낮음

</div>


<div>

8

<br>

🟡 보통

</div>


<div>

15

<br>

🔴 높음

</div>


</div>







<div id="message"></div>





<button
onclick="shareResult()"
class="btn btn-primary w-100 mt-3">

결과 공유

</button>




<button
onclick="restart()"
class="btn btn-outline-secondary w-100 mt-2">

다시 하기

</button>



</section>



</div>

</div>




<script src="script.js"></script>


</body>

</html>
